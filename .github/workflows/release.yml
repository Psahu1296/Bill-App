name: Build and Release

on:
  push:
    tags:
      - 'v*' # Trigger the pipeline when pushing a tag like 'v1.0.0'

jobs:
  release:
    name: Build & Release on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    # Need write permissions for creating a release
    permissions:
      contents: write
    strategy:
      matrix:
        # We build on all three major OS environments to get platform-specific installers
        os: [macos-latest, windows-latest, ubuntu-latest]
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Sync package.json version with the git tag (strips leading 'v')
      # e.g. tag v1.3.1 → package.json "version": "1.3.1"
      # electron-updater uses this to decide if the installed app is outdated.
      - name: Sync version from git tag
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "Setting package.json version to $TAG"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$TAG';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Install dependencies
        shell: bash
        run: |
          npm install
          cd pos-backend && npm install
          cd ../pos-frontend && npm install

      # Note: --publish never has been removed so that electron-builder generates
      # the latest-mac.yml / latest.yml / latest-linux.yml update manifests.
      # softprops/action-gh-release below handles all artifact uploads via GITHUB_TOKEN.
      - name: Build and Package Installer (macOS)
        if: matrix.os == 'macos-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: npm run dist:mac

      - name: Build and Package Installer (Windows)
        if: matrix.os == 'windows-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: npm run dist:win

      - name: Build and Package Installer (Linux)
        if: matrix.os == 'ubuntu-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: npm run dist:linux

      - name: Upload Artifacts to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/*.exe
            release/*.dmg
            release/*.AppImage
            release/latest*.yml
            release/*.blockmap
            release/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
