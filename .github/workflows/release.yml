name: Build and Release

on:
  push:
    tags:
      - 'v*' # Trigger the pipeline when pushing a tag like 'v1.0.0'

jobs:
  # ── Step 1: Create the GitHub Release so upload jobs have a target ───────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create release (skip if already exists)
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # --generate-notes auto-fills the body from commits since last tag.
          # If the release already exists (re-run), this exits 0 silently.
          gh release view "$TAG" 2>/dev/null \
            || gh release create "$TAG" \
                 --title "$TAG" \
                 --generate-notes \
                 --draft=false \
                 --prerelease=false

  # ── Step 2: Build installers and upload per platform ─────────────────────────
  release:
    name: Build & Release on ${{ matrix.os }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    environment: prod
    permissions:
      contents: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      NODE_OPTIONS: "--max-old-space-size=4096"
      # Disable macOS keychain auto-discovery (we don't sign mac builds in CI)
      CSC_IDENTITY_AUTO_DISCOVERY: false
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Sync package.json version with the git tag (strips leading 'v')
      # e.g. tag v1.5.0 → package.json "version": "1.5.0"
      # electron-updater uses this to decide if the installed app is outdated.
      - name: Sync version from git tag
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "Setting package.json version to $TAG"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$TAG';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Install dependencies
        shell: bash
        run: |
          npm install
          cd pos-backend && npm install
          cd ../pos-frontend && npm install

      # Write .env files from GitHub Secrets so the build has all required variables.
      # Add each variable under repo Settings → Secrets and variables → Actions.
      - name: Write environment files
        shell: bash
        run: |
          cat > pos-backend/.env << 'EOF'
          PORT=5002
          NODE_ENV=production
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          FRONTEND_URL=${{ secrets.FRONTEND_URL }}
          CUSTOMER_APP_URL=${{ secrets.CUSTOMER_APP_URL }}
          SERVER_URL=${{ secrets.SERVER_URL }}
          PHONEPE_MERCHANT_ID=${{ secrets.PHONEPE_MERCHANT_ID }}
          PHONEPE_SALT_KEY=${{ secrets.PHONEPE_SALT_KEY }}
          PHONEPE_SALT_INDEX=${{ secrets.PHONEPE_SALT_INDEX }}
          PHONEPE_ENV=${{ secrets.PHONEPE_ENV }}
          CLOUDFLARE_TUNNEL_TOKEN=${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
          CLOUDFLARE_TUNNEL_URL=${{ secrets.CLOUDFLARE_TUNNEL_URL }}
          EOF

          cat > pos-frontend/.env << 'EOF'
          VITE_CUSTOMER_APP_URL=${{ secrets.VITE_CUSTOMER_APP_URL }}
          EOF

      - name: Download cloudflared binary
        shell: bash
        run: |
          mkdir -p build-resources/bin
          if [ "$RUNNER_OS" = "Windows" ]; then
            curl -fsSL -o build-resources/bin/cloudflared-win32-x64.exe \
              https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe
          elif [ "$RUNNER_OS" = "macOS" ]; then
            curl -fsSL -o build-resources/bin/cloudflared-darwin-universal \
              https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-darwin-universal
            chmod +x build-resources/bin/cloudflared-darwin-universal
          else
            curl -fsSL -o build-resources/bin/cloudflared-linux-x64 \
              https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
            chmod +x build-resources/bin/cloudflared-linux-x64
          fi

      - name: Rebuild native modules for Electron
        shell: bash
        run: |
          ELECTRON_VERSION=$(node -e "console.log(require('./node_modules/electron/package.json').version)")
          cd pos-backend
          npx @electron/rebuild -f -w better-sqlite3 --version "$ELECTRON_VERSION"

      - name: Build and Package Installer (macOS)
        if: matrix.os == 'macos-latest'
        run: npm run build && npx electron-builder --mac --publish never

      - name: Build and Package Installer (Windows)
        if: matrix.os == 'windows-latest'
        # WIN_CSC_LINK  — base64-encoded .pfx certificate (GitHub Secret)
        # WIN_CSC_KEY_PASSWORD — password for the .pfx (GitHub Secret)
        # If the secrets are not set, electron-builder builds unsigned (no error).
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: npm run build && npx electron-builder --win --publish never

      - name: Build and Package Installer (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npm run build && npx electron-builder --linux --publish never

      # gh release upload --clobber overwrites already-existing assets,
      # so re-running a failed job never causes 422 "already_exists" errors.
      - name: Upload Artifacts to GitHub Release (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release upload "$TAG" \
            release/*.exe \
            release/*.exe.blockmap \
            release/latest.yml \
            --clobber

      - name: Upload Artifacts to GitHub Release (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          FILES=()
          for pattern in "release/*.dmg" "release/*.zip" "release/*.blockmap" "release/latest-mac.yml"; do
            for f in $pattern; do
              [ -f "$f" ] && FILES+=("$f")
            done
          done
          if [ ${#FILES[@]} -gt 0 ]; then
            gh release upload "$TAG" "${FILES[@]}" --clobber
          fi

      - name: Upload Artifacts to GitHub Release (Linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release upload "$TAG" \
            release/*.AppImage \
            release/latest-linux.yml \
            --clobber
