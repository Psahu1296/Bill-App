name: Build and Release

on:
  push:
    tags:
      - 'v*' # Trigger the pipeline when pushing a tag like 'v1.0.0'

jobs:
  release:
    name: Build & Release on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    # Need write permissions for creating a release
    permissions:
      contents: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      NODE_OPTIONS: "--max-old-space-size=4096"
      CSC_IDENTITY_AUTO_DISCOVERY: false
    strategy:
      matrix:
        # We build on all three major OS environments to get platform-specific installers
        os: [macos-latest, windows-latest, ubuntu-latest]
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Sync package.json version with the git tag (strips leading 'v')
      # e.g. tag v1.3.1 → package.json "version": "1.3.1"
      # electron-updater uses this to decide if the installed app is outdated.
      - name: Sync version from git tag
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "Setting package.json version to $TAG"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$TAG';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Install dependencies
        shell: bash
        run: |
          npm install
          cd pos-backend && npm install
          cd ../pos-frontend && npm install

      # --publish never prevents electron-builder from uploading to GitHub itself.
      # The manifest files (latest.yml etc.) are still generated on disk.
      # Our gh release upload steps below handle all artifact uploads.
      - name: Build and Package Installer (macOS)
        if: matrix.os == 'macos-latest'
        run: npm run build && npx electron-builder --mac --publish never

      - name: Build and Package Installer (Windows)
        if: matrix.os == 'windows-latest'
        run: npm run build && npx electron-builder --win --publish never

      - name: Build and Package Installer (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npm run build && npx electron-builder --linux --publish never

      # gh release upload --clobber overwrites already-existing assets,
      # so re-running a failed job never causes 422 "already_exists" errors.
      # Each platform only uploads the files it actually produced.
      - name: Upload Artifacts to GitHub Release (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release upload "$TAG" \
            release/*.exe \
            release/*.exe.blockmap \
            release/latest.yml \
            --clobber

      - name: Upload Artifacts to GitHub Release (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # Build the file list using globs — bash expansion preserves spaces in filenames.
          # Use a bash array so each path is a separate argument to gh.
          FILES=()
          for pattern in "release/*.dmg" "release/*.zip" "release/*.blockmap" "release/latest-mac.yml"; do
            for f in $pattern; do
              [ -f "$f" ] && FILES+=("$f")
            done
          done
          if [ ${#FILES[@]} -gt 0 ]; then
            gh release upload "$TAG" "${FILES[@]}" --clobber
          fi

      - name: Upload Artifacts to GitHub Release (Linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release upload "$TAG" \
            release/*.AppImage \
            release/latest-linux.yml \
            --clobber
