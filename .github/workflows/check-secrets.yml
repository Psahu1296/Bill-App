name: Check Secrets (Debug)

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Verify secrets are set and show safe values
        shell: bash
        run: |
          echo "=== Checking secrets are set (non-empty) ==="

          check() {
            local name=$1
            local value=$2
            if [ -z "$value" ]; then
              echo "❌ $name — NOT SET"
            else
              echo "✅ $name — set"
            fi
          }

          check "JWT_SECRET"             "${{ secrets.JWT_SECRET }}"
          check "FRONTEND_URL"           "${{ secrets.FRONTEND_URL }}"
          check "CUSTOMER_APP_URL"       "${{ secrets.CUSTOMER_APP_URL }}"
          check "SERVER_URL"             "${{ secrets.SERVER_URL }}"
          check "PHONEPE_MERCHANT_ID"    "${{ secrets.PHONEPE_MERCHANT_ID }}"
          check "PHONEPE_SALT_KEY"       "${{ secrets.PHONEPE_SALT_KEY }}"
          check "PHONEPE_SALT_INDEX"     "${{ secrets.PHONEPE_SALT_INDEX }}"
          check "PHONEPE_ENV"            "${{ secrets.PHONEPE_ENV }}"
          check "CLOUDFLARE_TUNNEL_TOKEN" "${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}"
          check "CLOUDFLARE_TUNNEL_URL"  "${{ secrets.CLOUDFLARE_TUNNEL_URL }}"
          check "VITE_CUSTOMER_APP_URL"  "${{ secrets.VITE_CUSTOMER_APP_URL }}"
          check "WIN_CSC_LINK"           "${{ secrets.WIN_CSC_LINK }}"
          check "WIN_CSC_KEY_PASSWORD"   "${{ secrets.WIN_CSC_KEY_PASSWORD }}"

          echo ""
          echo "=== Partial values (first 10 chars + total length) ==="

          peek() {
            local name=$1
            local value=$2
            local len=${#value}
            local preview="${value:0:10}"
            echo "$name: ${preview}... (len=$len)"
          }

          peek "FRONTEND_URL"           "${{ secrets.FRONTEND_URL }}"
          peek "CUSTOMER_APP_URL"       "${{ secrets.CUSTOMER_APP_URL }}"
          peek "SERVER_URL"             "${{ secrets.SERVER_URL }}"
          peek "CLOUDFLARE_TUNNEL_URL"  "${{ secrets.CLOUDFLARE_TUNNEL_URL }}"
          peek "VITE_CUSTOMER_APP_URL"  "${{ secrets.VITE_CUSTOMER_APP_URL }}"
          peek "PHONEPE_ENV"            "${{ secrets.PHONEPE_ENV }}"
          peek "PHONEPE_SALT_INDEX"     "${{ secrets.PHONEPE_SALT_INDEX }}"
          peek "PHONEPE_MERCHANT_ID"    "${{ secrets.PHONEPE_MERCHANT_ID }}"
