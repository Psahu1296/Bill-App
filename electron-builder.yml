productName: Dhaba POS
appId: com.dhaba.pos
copyright: Copyright © 2024 Dhaba POS

directories:
  output: release
  buildResources: build-resources

publish:
  provider: github
  owner: Psahu1296
  repo: Bill-App

# ── What gets packaged ─────────────────────────────────────────────────────────
# The asar contains only what Electron itself needs:
#   electron/dist  : compiled Electron main + preload
#   pos-frontend/dist : built React app (served by Express as static files)
#
# The backend is placed in extraResources (outside the asar) so that:
#   1. pos-backend/node_modules is NOT subject to .gitignore filtering
#   2. better-sqlite3's native .node binary is directly accessible (no asarUnpack needed)
#   3. require('express') resolves correctly relative to the server file path
#
# Layout inside the installed app:
#   resources/app.asar              ← electron main + preload + frontend
#   resources/backend/dist/         ← compiled Express server JS
#   resources/backend/node_modules/ ← express, better-sqlite3, etc.

files:
  - electron/dist/**
  - package.json

extraResources:
  - from: pos-backend/dist
    to: backend/dist
    filter:
      - "**/*"
  - from: pos-backend/node_modules
    to: backend/node_modules
    filter:
      - "**/*"
  - from: pos-frontend/dist
    to: frontend/dist
    filter:
      - "**/*"
  - from: pos-backend/.env
    to: backend/.env

# ── Windows installer ──────────────────────────────────────────────────────────
# Code signing — set WIN_CSC_LINK (base64 .pfx) and WIN_CSC_KEY_PASSWORD in
# GitHub Secrets (or env). When absent the build still succeeds but shows the
# SmartScreen "Unknown Publisher" warning. With an OV/EV cert it is suppressed.
win:
  # artifactName uses dots so the generated latest.yml and the GitHub download
  # URL always match (GitHub converts spaces → dots in asset filenames).
  artifactName: "Dhaba.POS.Setup.${version}.${ext}"
  target:
    - target: nsis
      arch:
        - x64
  # Timestamp server ensures the signature stays valid after the cert expires.
  rfc3161TimeStampServer: http://timestamp.digicert.com
  signingHashAlgorithms:
    - sha256
  # publisherName must match the Common Name on your certificate.
  # Once set, Windows associates downloads with this name for SmartScreen reputation.
  publisherName: Dhaba POS

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Dhaba POS
  # Require admin elevation so Windows marks it as a known installer pattern
  # (reduces SmartScreen friction even without a cert)
  perMachine: false
  runAfterFinish: true

# ── macOS installer ────────────────────────────────────────────────────────────
mac:
  # artifactName uses dots — matches the GitHub asset URL after space→dot conversion.
  # ${arch} is always included so x64 and arm64 have distinct, predictable names.
  artifactName: "Dhaba.POS-${version}-${arch}.${ext}"
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.business

# ── Linux installer ────────────────────────────────────────────────────────────
linux:
  artifactName: "Dhaba.POS-${version}-${arch}.${ext}"
  target:
    - target: AppImage
      arch:
        - x64
  category: Office
