productName: Dhaba POS
appId: com.dhaba.pos
copyright: Copyright © 2024 Dhaba POS

directories:
  output: release
  buildResources: build-resources

publish:
  provider: github

# ── What gets packaged ─────────────────────────────────────────────────────────
# electron/dist  : compiled Electron main + preload
# pos-backend/dist : compiled Express server
# pos-backend/node_modules : Express/better-sqlite3/etc. runtime deps
# pos-frontend/dist : built React app (served by Express as static files)
#
# better-sqlite3 is a native addon — it must be unpacked from the asar so the
# .node binary can be loaded by Node at runtime.

files:
  - electron/dist/**
  - pos-backend/dist/**
  - pos-backend/node_modules/**
  - pos-frontend/dist/**
  - package.json

asarUnpack:
  - pos-backend/node_modules/**

# ── Windows installer ──────────────────────────────────────────────────────────
win:
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Dhaba POS

# ── macOS installer ────────────────────────────────────────────────────────────
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.business

# ── Linux installer ────────────────────────────────────────────────────────────
linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Office
