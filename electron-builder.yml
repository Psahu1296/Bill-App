productName: Dhaba POS
appId: com.dhaba.pos
copyright: Copyright © 2024 Dhaba POS

directories:
  output: release
  buildResources: build-resources

publish:
  provider: github

# ── What gets packaged ─────────────────────────────────────────────────────────
# The asar contains only what Electron itself needs:
#   electron/dist  : compiled Electron main + preload
#   pos-frontend/dist : built React app (served by Express as static files)
#
# The backend is placed in extraResources (outside the asar) so that:
#   1. pos-backend/node_modules is NOT subject to .gitignore filtering
#   2. better-sqlite3's native .node binary is directly accessible (no asarUnpack needed)
#   3. require('express') resolves correctly relative to the server file path
#
# Layout inside the installed app:
#   resources/app.asar              ← electron main + preload + frontend
#   resources/backend/dist/         ← compiled Express server JS
#   resources/backend/node_modules/ ← express, better-sqlite3, etc.

files:
  - electron/dist/**
  - package.json

extraResources:
  - from: pos-backend/dist
    to: backend/dist
    filter:
      - "**/*"
  - from: pos-backend/node_modules
    to: backend/node_modules
    filter:
      - "**/*"
  - from: pos-frontend/dist
    to: frontend/dist
    filter:
      - "**/*"

# ── Windows installer ──────────────────────────────────────────────────────────
win:
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Dhaba POS

# ── macOS installer ────────────────────────────────────────────────────────────
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.business

# ── Linux installer ────────────────────────────────────────────────────────────
linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Office
